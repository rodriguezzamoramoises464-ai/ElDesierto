<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ElDesierto - Menú</title><style>

body {
font-family: Arial, sans-serif;
background: #f5f2e8;
text-align: center;
padding: 25px;
}

h1 {
color:#8b4513;
}

.boton {
display:block;
width:90%;
max-width:350px;
margin:15px auto;
padding:18px;
background:#8b4513;
color:white;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.logo {
font-size:60px;
}

#cargando {
color:#8b4513;
font-size:18px;
}

</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><div class="logo">🐷🌽</div><h1>ElDesierto</h1><p>Panel principal</p><p id="cargando">Cargando usuario...</p><div id="menu" style="display:none;"><div class="boton" onclick="window.location.href='inventario.html'">
📦 Inventario
</div>

<div class="boton" onclick="window.location.href='entrada.html'">
➕ Entrada de mercancía
</div>

<div class="boton" onclick="window.location.href='salida.html'">
➖ Salida de mercancía
</div>

<div class="boton" onclick="window.location.href='historial.html'">
📜 Historial
</div>

<div class="boton" onclick="window.location.href='reportes.html'">
📊 Reportes
</div>

<div id="botonAjustes" class="boton" onclick="window.location.href='ajustes.html'">
⚙️ Ajustes
</div>

</div><script src="supabase.js"></script><script>

async function verificarUsuario(){

    const { data: sesion, error: errorSesion } =
        await clienteSupabase.auth.getSession();


    if(errorSesion){

        alert("Error comprobando la sesión: " + errorSesion.message);

        return;

    }


    if(!sesion.session){

        window.location.href = "login.html";

        return;

    }


    const idUsuario = sesion.session.user.id;


    const { data: perfil, error: errorPerfil } =

        await clienteSupabase

        .from("Perfiles")

        .select("rol")

        .eq("id", idUsuario)

        .single();


    if(errorPerfil){

        alert("Error obteniendo el rol: " + errorPerfil.message);

        return;

    }


    document.getElementById("cargando").innerText =
        "Rol: " + perfil.rol;


    document.getElementById("menu").style.display = "block";


    if(perfil.rol === "Operador"){

        document.getElementById("botonAjustes").style.display = "none";

    }

}


verificarUsuario();

</script></body>
</html>
