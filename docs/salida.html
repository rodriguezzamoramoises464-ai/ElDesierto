<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salida de mercancía</title>

<style>
body{
font-family:Arial;
background:#f5f2e8;
padding:20px;
text-align:center;
}

.caja{
background:white;
max-width:350px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px #ccc;
}

input,select,textarea{
width:90%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#8b4513;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:16px;
margin-top:10px;
}

h1{
color:#8b4513;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="caja">

<h1>➖ Salida</h1>

<input type="date" id="fecha">

<select id="producto">

<option value="1">Maíz</option>
<option value="2">Soja</option>
<option value="3">Salvado</option>
<option value="4">Cebada</option>

</select>

<input type="number" id="cantidad" placeholder="Cantidad (kg)">

<textarea id="observacion" placeholder="Observación"></textarea>

<button onclick="guardarSalida()">Guardar salida</button>

</div>

<script>

async function guardarSalida(){

    const fecha = document.getElementById("fecha").value;
    const idProducto = Number(document.getElementById("producto").value);
    const cantidad = Number(document.getElementById("cantidad").value);
    const observacion = document.getElementById("observacion").value;

    if(!fecha || !cantidad || cantidad <= 0){
        alert("Completa correctamente la fecha y la cantidad.");
        return;
    }

    const { data: productosEncontrados, error: errorBusqueda } =
        await clienteSupabase
        .from("Productos")
        .select("*")
        .eq("Identificación", idProducto);

    if(errorBusqueda){
        alert("Error buscando el producto: " + errorBusqueda.message);
        return;
    }

    if(!productosEncontrados || productosEncontrados.length === 0){
        alert("No se encontró el producto.");
        return;
    }

    const productoEncontrado = productosEncontrados[0];

    const cantidadActual = Number(productoEncontrado.Cantidad);

    if(cantidad > cantidadActual){
        alert("No hay suficiente cantidad disponible en el inventario.");
        return;
    }

    const nuevaCantidad = cantidadActual - cantidad;

    const { error: errorActualizacion } =
        await clienteSupabase
        .from("Productos")
        .update({
            Cantidad: nuevaCantidad
        })
        .eq("Identificación", productoEncontrado.Identificación);

    if(errorActualizacion){
        alert("Error actualizando el inventario: " + errorActualizacion.message);
        return;
    }

    const { error: errorMovimiento } =
        await clienteSupabase
        .from("Movimientos")
        .insert([{
            Fecha: fecha,
            Producto: productoEncontrado.Nombre,
            Tipo: "Salida",
            Cantidad: cantidad,
            Usuario: "Administrador",
            Observación: observacion,
            Numero_operacion: "SA-" + Date.now()
        }]);

    if(errorMovimiento){
        alert("Error registrando la salida: " + errorMovimiento.message);
        return;
    }

    alert("Salida registrada correctamente.");

}

</script>

<script src="supabase.js"></script>
<script>

async function verificarSesion(){

    const { data } = await clienteSupabase.auth.getSession();

    if(!data.session){

        window.location.href = "login.html";

    }

}

verificarSesion();

</script>
</body>
</html>
